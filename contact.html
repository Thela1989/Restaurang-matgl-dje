<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurang matglädje</title>
    <meta
      name="description"
      content="Här kan du ta kontakt med oss om du vill boka bord eller har frågor"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <nav id="navbar">
      <ul id="nav-link">
        <li><a href="index.html">Hem</a></li>
        <li><a href="meny.html">Meny</a></li>
        <li>
          <a href="contact.html">Kontakta oss</a>
        </li>
      </ul>
    </nav>
    <div class="contact-image-container">
      <img
        class="contact-image"
        src="pictures/drinks.jpg"
        alt="en grupp människor som skålar med drinkar"
      />
    </div>

    <header>
      <h1 id="contact-header"><u>Kontakta oss</u></h1>
    </header>
    <main id="contact-main">
      <h2>För bordsbokning</h2>

      <h3>Ring oss på tel:</h3>

      <div class="contact-container">
        <img
          class="contact-icon"
          src="pictures/call.png"
          alt="en telefon-icon"
        />

        <p>Tel:073-1421800</p>
      </div>
      <h3>Det går också bra att mejla oss:</h3>
      <div class="contact-container">
        <img class="contact-icon" src="pictures/mail.png" alt="En mejl-icon" />
        <p>contact@matgladje.se</p>
      </div>
      <h3>Du hittar oss här!</h3>
      <div class="contact-container">
        <img
          class="contact-icon"
          src="pictures/location_icon.png"
          alt="Det här är en icon för destination"
        />

        <p id="contact-adress-text">Drottninggatan 12, 411 14 Göteborg</p>
      </div>
    </main>
    <footer>&copy; Therese Lagerhäll</footer>
  </body>
</html>
